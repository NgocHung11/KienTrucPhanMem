services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    restart: always
    depends_on:
      - db
    ports:
      - "8083:8080"
